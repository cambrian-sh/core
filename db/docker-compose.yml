services:
  cambrian-db:
    image: pgvector/pgvector:pg16
    container_name: cambrian-db
    environment:
      POSTGRES_USER: ${CAMBRIAN_DB_USER:-cambrian}
      POSTGRES_PASSWORD: ${CAMBRIAN_DB_PASSWORD:-cambrian}
      POSTGRES_DB: cambrian_db
    ports:
      - "5432:5432"
    volumes:
      - cambrian_data:/var/lib/postgresql/data
    restart: always

  # ADR-0054 D2: always-up PageRank recompute worker. Decoupled from the
  # (intermittent) kernel — it keeps chunk_pagerank fresh on its own ticker, and
  # the kernel only READS the table. restart:always means it recomputes whenever
  # the device/Docker is up, regardless of the kernel's lifecycle.
  pagerank-recompute:
    build:
      context: ..
      dockerfile: cmd/pagerank-recompute/Dockerfile
    container_name: cambrian-pagerank
    depends_on:
      - cambrian-db
    ports:
      # On-demand trigger endpoint (POST /recompute) the kernel calls.
      - "8088:8088"
    environment:
      PAGERANK_HTTP_ADDR: ":8088"
      # PAGERANK_TRIGGER_TOKEN: "<shared-secret>"  # optional: require X-Trigger-Token
      # Point the worker at the DB service (overrides configs/config.json via koanf env).
      CAMBRIAN_DATABASE__HOST: cambrian-db
      CAMBRIAN_DATABASE__PORT: "5432"
      CAMBRIAN_DATABASE__USER: ${CAMBRIAN_DB_USER:-cambrian}
      CAMBRIAN_DATABASE__PASSWORD: ${CAMBRIAN_DB_PASSWORD:-cambrian}
      CAMBRIAN_DATABASE__DBNAME: cambrian_db
      # Recompute cadence + algorithm knobs (see cmd/pagerank-recompute/main.go).
      PAGERANK_INTERVAL_SEC: "3600"
      PAGERANK_MAX_AGE_HOURS: "24"
      PAGERANK_DELTA_PCT: "5"
      PAGERANK_DF_CAP: "2000"
    restart: always

volumes:
  cambrian_data:
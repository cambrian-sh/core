name: Bug report
description: Report a defect in the Cambrian runtime
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. **Do not report security vulnerabilities here** — see SECURITY.md.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `--version`, or the git SHA / release tag.
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Go version, how you ran it (binary, source), relevant config (NO secrets).
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      render: shell
